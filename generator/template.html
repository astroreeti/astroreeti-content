<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Fonts are installed system-wide (~/.fonts) and resolved by fontconfig */

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body {
    background:#F6EEDF;
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(224,138,46,.13), transparent 55%),
      radial-gradient(ellipse at 50% 112%, rgba(110,30,30,.10), transparent 55%);
    font-family:'Cormorant Garamond','Noto Serif Devanagari', serif;
    color:#3A2A1E;
    position:relative;
    overflow:hidden;
  }
  .dev { font-family:'Noto Serif Devanagari', serif; }

  /* double border frame */
  .frame-outer { position:absolute; inset:36px; border:3px solid #7A2323; border-radius:4px; }
  .frame-inner { position:absolute; inset:50px; border:1.5px solid #C19A49; border-radius:2px; }

  /* corner flourishes */
  .corner { position:absolute; width:110px; height:110px; opacity:.9; }
  .corner svg { width:100%; height:100%; }
  .c-tl { top:22px; left:22px; }
  .c-tr { top:22px; right:22px; transform:scaleX(-1); }
  .c-bl { bottom:22px; left:22px; transform:scaleY(-1); }
  .c-br { bottom:22px; right:22px; transform:scale(-1,-1); }

  .content {
    position:absolute; inset:50px;
    display:flex; flex-direction:column; align-items:center;
    text-align:center; padding:90px 96px 110px;
  }

  .eyebrow {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:30px; letter-spacing:.32em; text-transform:uppercase;
    color:#B0722A; margin-bottom:10px;
  }
  .eyebrow .dev { font-size:32px; letter-spacing:.12em; }

  .divider { margin:26px 0; width:420px; }

  h1 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:88px; line-height:1.14; color:#6E1E1E;
    margin:14px 0 0;
  }
  h1 em { font-style:italic; color:#B0722A; }
  h2 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:72px; line-height:1.16; color:#6E1E1E;
    margin:10px 0 0;
  }
  h2 em { font-style:italic; color:#B0722A; }

  .sub {
    font-size:44px; line-height:1.42; font-weight:500;
    color:#4A3423; max-width:820px; margin-top:34px;
  }
  .body {
    font-size:46px; line-height:1.5; font-weight:500;
    color:#42301F; max-width:830px; margin-top:40px; text-align:center;
  }
  .body b, .sub b { color:#7A2323; font-weight:700; }
  .body em, .sub em { color:#B0722A; }

  .points { margin-top:44px; max-width:840px; text-align:left; }
  .point { display:flex; gap:26px; margin-bottom:38px; align-items:flex-start; }
  .point .num {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:52px; color:#C19A49;
    line-height:1.15; min-width:52px; text-align:center;
  }
  .point .pt { font-size:43px; line-height:1.42; font-weight:500; color:#42301F; }
  .point .pt b { color:#7A2323; }

  .icon-top { margin-bottom:6px; }

  .footer {
    position:absolute; bottom:78px; left:0; right:0;
    display:flex; justify-content:center; align-items:center; gap:18px;
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600; font-size:28px;
    letter-spacing:.18em; color:#8A6B3F;
  }
  .footer .dot { width:7px; height:7px; border-radius:50%; background:#C19A49; }

  .swipe {
    margin-top:auto; font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:32px; letter-spacing:.24em; color:#7A2323;
  }
  .cta-handle {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:58px; color:#7A2323;
    margin-top:26px; letter-spacing:.02em;
  }
</style>
</head>
<body>
  <div class="frame-outer"></div>
  <div class="frame-inner"></div>

  <div class="corner c-tl"><svg viewBox="0 0 100 100" fill="none">
    <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
    <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
    <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
    <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
  </svg></div>
  <div class="corner c-tr"><svg viewBox="0 0 100 100" fill="none">
    <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
    <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
    <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
    <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
  </svg></div>
  <div class="corner c-bl"><svg viewBox="0 0 100 100" fill="none">
    <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
    <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
    <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
    <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
  </svg></div>
  <div class="corner c-br"><svg viewBox="0 0 100 100" fill="none">
    <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
    <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
    <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
    <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
  </svg></div>

  <div class="content">
    <!--SLIDE-->
  </div>

  <div class="footer"><span class="dot"></span><span>@ASTROREETI</span><span class="dot"></span><span><!--PAGE--></span><span class="dot"></span></div>
</body>
</html>
