<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Fonts are installed system-wide (~/.fonts) and resolved by fontconfig */

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:__CANVAS_W__px; height:__CANVAS_H__px; overflow:hidden; background:transparent; }
  body {
    font-family:'Cormorant Garamond','Noto Serif Devanagari', serif;
    color:#F7EFDD;
    position:relative;
  }
  .dev { font-family:'Noto Serif Devanagari', serif; }

  /* text sits directly over the video (captured with a transparent
     background, no chroma key involved) — no card/frame, just legible
     light type with a soft drop shadow so it reads over any footage. */
  #content {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 88px;
  }

  .eyebrow {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:28px; letter-spacing:.32em; text-transform:uppercase;
    color:#E9C165; margin-bottom:8px;
    text-shadow:0 2px 14px rgba(0,0,0,.65), 0 1px 3px rgba(0,0,0,.85);
  }
  .eyebrow .dev { font-size:30px; letter-spacing:.12em; }

  .divider { margin:24px 0; width:340px; opacity:.9; filter:drop-shadow(0 2px 8px rgba(0,0,0,.6)); }

  h1 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:82px; line-height:1.14; color:#FFFDF8;
    margin:12px 0 0;
    text-shadow:0 4px 22px rgba(0,0,0,.6), 0 1px 4px rgba(0,0,0,.85);
  }
  h1 em { font-style:italic; color:#E9C165; }
  h2 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:66px; line-height:1.16; color:#FFFDF8;
    margin:8px 0 0;
    text-shadow:0 4px 22px rgba(0,0,0,.6), 0 1px 4px rgba(0,0,0,.85);
  }
  h2 em { font-style:italic; color:#E9C165; }

  .sub {
    font-size:40px; line-height:1.42; font-weight:500;
    color:#F3E9D6; max-width:820px; margin-top:30px;
    text-shadow:0 3px 16px rgba(0,0,0,.6), 0 1px 3px rgba(0,0,0,.85);
  }
  .body {
    font-size:42px; line-height:1.5; font-weight:500;
    color:#F3E9D6; max-width:830px; margin-top:36px; text-align:center;
    text-shadow:0 3px 16px rgba(0,0,0,.6), 0 1px 3px rgba(0,0,0,.85);
  }
  .body b, .sub b { color:#F4CD73; font-weight:700; }
  .body em, .sub em { color:#E9C165; }

  .points { margin-top:40px; max-width:840px; text-align:left; }
  .point { display:flex; gap:24px; margin-bottom:34px; align-items:flex-start; }
  .point .num {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:48px; color:#E9C165;
    line-height:1.15; min-width:48px; text-align:center;
    text-shadow:0 2px 12px rgba(0,0,0,.65);
  }
  .point .pt {
    font-size:40px; line-height:1.42; font-weight:500; color:#F3E9D6;
    text-shadow:0 3px 16px rgba(0,0,0,.6), 0 1px 3px rgba(0,0,0,.85);
  }
  .point .pt b { color:#F4CD73; }

  .icon-top { margin-bottom:4px; filter:drop-shadow(0 2px 10px rgba(0,0,0,.6)); }
  .icon-top svg circle[fill="#7A2323"], .icon-top svg path[fill="#7A2323"] { fill:#F4CD73; }
  .icon-top svg circle[stroke="#C19A49"], .icon-top svg path[stroke="#C19A49"] { stroke:#F7EFDD; }

  .footer {
    position:absolute; bottom:64px; left:0; right:0;
    display:flex; justify-content:center; align-items:center; gap:16px;
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600; font-size:24px;
    letter-spacing:.18em; color:#F3E9D6; opacity:.92;
    text-shadow:0 2px 10px rgba(0,0,0,.65);
  }
  .footer .dot { width:6px; height:6px; border-radius:50%; background:#E9C165; }

  .swipe {
    margin-top:auto; font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:30px; letter-spacing:.24em; color:#F4CD73;
    text-shadow:0 2px 12px rgba(0,0,0,.65);
  }
  .cta-handle {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:54px; color:#FFFDF8;
    margin-top:24px; letter-spacing:.02em;
    text-shadow:0 4px 20px rgba(0,0,0,.65), 0 1px 4px rgba(0,0,0,.85);
  }
</style>
</head>
<body>
  <div id="content"></div>
  <div class="footer"><span class="dot"></span><span>@ASTROREETI</span><span class="dot"></span><span id="page"></span><span class="dot"></span></div>

<script>
  // Deterministic, frame-steppable renderer: no WAAPI/CSS animation, no
  // real-time timers. The Python driver calls renderAtTime(tMs) once per
  // output frame, we compute every element's style directly from tMs, and
  // it screenshots the transparent-background result. This makes the
  // capture frame-accurate (no wall-clock/vsync drift) and gives a true
  // alpha channel (no green-screen spill on thin text).
  var SLIDES = __SLIDES__;
  var PER_MS = __PER_SLIDE_MS__;
  var ENTRANCE_DUR = 650;
  var STAGGER = 130;
  var GAP_FADE = 300; // ms faded at the very start/end of each slide's dwell

  var contentEl = document.getElementById('content');
  var pageEl = document.getElementById('page');
  var renderedIdx = -1;

  function easeOutCubic(p) { return 1 - Math.pow(1 - p, 3); }
  function clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }

  window.renderAtTime = function (tMs) {
    var n = SLIDES.length;
    var idx = Math.min(n - 1, Math.floor(tMs / PER_MS));
    var slideStart = idx * PER_MS;
    var localT = tMs - slideStart;

    if (idx !== renderedIdx) {
      contentEl.innerHTML = SLIDES[idx].html;
      pageEl.textContent = SLIDES[idx].page;
      renderedIdx = idx;
    }

    // per-child staggered entrance, purely a function of localT
    var kids = contentEl.children;
    for (var k = 0; k < kids.length; k++) {
      var p = clamp01((localT - k * STAGGER) / ENTRANCE_DUR);
      var eased = easeOutCubic(p);
      kids[k].style.opacity = String(eased);
      kids[k].style.transform = 'translateY(' + (40 * (1 - eased)) + 'px)';
    }

    // whole-block fade at the seam between slides (skipped on the very
    // first slide's entrance and the very last slide's hold)
    var fadeIn = idx === 0 ? 1 : clamp01(localT / GAP_FADE);
    var fadeOut = idx === n - 1 ? 1 : clamp01((PER_MS - localT) / GAP_FADE);
    contentEl.style.opacity = String(Math.min(fadeIn, fadeOut));
  };

  window.renderAtTime(0);
</script>
</body>
</html>
