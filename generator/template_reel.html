<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Fonts are installed system-wide (~/.fonts) and resolved by fontconfig */

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; }
  body {
    background:#F6EEDF;
    font-family:'Cormorant Garamond','Noto Serif Devanagari', serif;
    color:#3A2A1E;
    position:relative;
  }
  .dev { font-family:'Noto Serif Devanagari', serif; }

  /* background scene: swapped per-slide (gradient + a large faint brand
     motif) so consecutive slides don't look identical. Sits behind
     everything, cross-fades on its own. */
  #scene { position:absolute; inset:0; z-index:0; }
  #scene-bg { position:absolute; inset:0; transition:none; }
  #scene-motif { position:absolute; inset:0; opacity:.9; }
  #stars { position:absolute; inset:0; z-index:1; }
  #card { z-index:2; }

  /* ambient twinkling stars, drift slowly across the whole 1080x1920 canvas */
  .star {
    position:absolute; border-radius:50%; background:#C19A49;
    animation: twinkle 3.4s ease-in-out infinite, drift 14s ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0%,100% { opacity:.15; } 50% { opacity:.85; } }
  @keyframes drift { from { transform:translateY(0); } to { transform:translateY(-18px); } }

  /* the 1080x1350 slide "card", vertically centered in the 1080x1920 canvas.
     #card handles the slide-to-slide fade/slide transition; #zoom (nested
     inside) handles the independent slow scale so the two transforms never
     fight over the same element. */
  #card {
    position:absolute; top:285px; left:0; width:1080px; height:1350px;
  }
  #zoom {
    position:relative; width:100%; height:100%;
    transform-origin:center center;
  }

  .frame-outer {
    position:absolute; inset:36px; border:3px solid #7A2323; border-radius:4px;
    animation: glow 4s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow:0 0 0 rgba(193,154,73,0); }
    50% { box-shadow:0 0 26px rgba(193,154,73,.45); }
  }
  .frame-inner { position:absolute; inset:50px; border:1.5px solid #C19A49; border-radius:2px; }

  .corner { position:absolute; width:110px; height:110px; opacity:.9; }
  .corner svg { width:100%; height:100%; }
  .c-tl { top:22px; left:22px; }
  .c-tr { top:22px; right:22px; transform:scaleX(-1); }
  .c-bl { bottom:22px; left:22px; transform:scaleY(-1); }
  .c-br { bottom:22px; right:22px; transform:scale(-1,-1); }

  #content {
    position:absolute; inset:50px;
    display:flex; flex-direction:column; align-items:center;
    text-align:center; padding:90px 96px 110px;
  }


  .eyebrow {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:30px; letter-spacing:.32em; text-transform:uppercase;
    color:#B0722A; margin-bottom:10px;
  }
  .eyebrow .dev { font-size:32px; letter-spacing:.12em; }

  .divider { margin:26px 0; width:420px; }

  h1 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:88px; line-height:1.14; color:#6E1E1E;
    margin:14px 0 0;
  }
  h1 em { font-style:italic; color:#B0722A; }
  h2 {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800;
    font-size:72px; line-height:1.16; color:#6E1E1E;
    margin:10px 0 0;
  }
  h2 em { font-style:italic; color:#B0722A; }

  .sub {
    font-size:44px; line-height:1.42; font-weight:500;
    color:#4A3423; max-width:820px; margin-top:34px;
  }
  .body {
    font-size:46px; line-height:1.5; font-weight:500;
    color:#42301F; max-width:830px; margin-top:40px; text-align:center;
  }
  .body b, .sub b { color:#7A2323; font-weight:700; }
  .body em, .sub em { color:#B0722A; }

  .points { margin-top:44px; max-width:840px; text-align:left; }
  .point { display:flex; gap:26px; margin-bottom:38px; align-items:flex-start; }
  .point .num {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:52px; color:#C19A49;
    line-height:1.15; min-width:52px; text-align:center;
  }
  .point .pt { font-size:43px; line-height:1.42; font-weight:500; color:#42301F; }
  .point .pt b { color:#7A2323; }

  .icon-top { margin-bottom:6px; }

  .footer {
    position:absolute; bottom:78px; left:0; right:0;
    display:flex; justify-content:center; align-items:center; gap:18px;
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600; font-size:28px;
    letter-spacing:.18em; color:#8A6B3F;
  }
  .footer .dot { width:7px; height:7px; border-radius:50%; background:#C19A49; }

  .swipe {
    margin-top:auto; font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:600;
    font-size:32px; letter-spacing:.24em; color:#7A2323;
  }
  .cta-handle {
    font-family:'Playfair Display','Noto Serif Devanagari'; font-weight:800; font-size:58px; color:#7A2323;
    margin-top:26px; letter-spacing:.02em;
  }
</style>
</head>
<body>
  <div id="scene">
    <div id="scene-bg"></div>
    <div id="scene-motif"></div>
  </div>
  <div id="stars"></div>

  <div id="card">
   <div id="zoom">
    <div class="frame-outer"></div>
    <div class="frame-inner"></div>

    <div class="corner c-tl"><svg viewBox="0 0 100 100" fill="none">
      <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
      <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
      <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
      <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
    </svg></div>
    <div class="corner c-tr"><svg viewBox="0 0 100 100" fill="none">
      <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
      <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
      <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
      <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
    </svg></div>
    <div class="corner c-bl"><svg viewBox="0 0 100 100" fill="none">
      <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
      <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
      <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
      <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
    </svg></div>
    <div class="corner c-br"><svg viewBox="0 0 100 100" fill="none">
      <path d="M14 86 C14 40 40 14 86 14" stroke="#C19A49" stroke-width="2.5"/>
      <path d="M14 70 C14 36 36 14 70 14" stroke="#7A2323" stroke-width="2"/>
      <circle cx="14" cy="86" r="5" fill="#7A2323"/><circle cx="86" cy="14" r="5" fill="#7A2323"/>
      <circle cx="30" cy="30" r="3.5" fill="#C19A49"/>
    </svg></div>

    <div id="content"></div>

    <div class="footer"><span class="dot"></span><span>@ASTROREETI</span><span class="dot"></span><span id="page"></span><span class="dot"></span></div>
   </div>
  </div>

<script>
  // ambient stars — each one gets its own independent Web Animations API
  // twinkle + drift loop (reliable, doesn't depend on CSS animation restart
  // tricks that browsers can silently drop).
  (function () {
    var starsEl = document.getElementById('stars');
    var n = 30;
    for (var i = 0; i < n; i++) {
      var s = document.createElement('div');
      var size = 3 + Math.random() * 5;
      s.className = 'star';
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.round(Math.random() * 1080) + 'px';
      s.style.top = Math.round(Math.random() * 1920) + 'px';
      starsEl.appendChild(s);
      s.animate(
        [{ opacity: .1 }, { opacity: .95 }, { opacity: .1 }],
        { duration: 1600 + Math.random() * 2400, iterations: Infinity, delay: Math.random() * 2000 }
      );
      s.animate(
        [{ transform: 'translateY(0px)' }, { transform: 'translateY(-26px)' }],
        { duration: 5000 + Math.random() * 6000, iterations: Infinity, direction: 'alternate',
          easing: 'ease-in-out', delay: Math.random() * 3000 }
      );
    }
  })();

  // slow pulsing glow around the frame
  document.querySelector('.frame-outer').animate(
    [
      { boxShadow: '0 0 0px rgba(193,154,73,0)' },
      { boxShadow: '0 0 34px rgba(193,154,73,.55)' },
      { boxShadow: '0 0 0px rgba(193,154,73,0)' },
    ],
    { duration: 4000, iterations: Infinity, easing: 'ease-in-out' }
  );

  // Four brand-consistent (cream/gold/maroon) background scenes, rotated
  // per slide so the backdrop visibly changes instead of staying static.
  var SCENES = [
    { // dawn glow — big dashed mandala ring behind the card
      bg: 'radial-gradient(ellipse at 50% -6%, rgba(224,138,46,.24), transparent 55%),' +
          'radial-gradient(ellipse at 50% 108%, rgba(110,30,30,.10), transparent 55%),#F8F1E4',
      motif: '<svg viewBox="0 0 1080 1920" width="1080" height="1920">' +
             '<circle cx="540" cy="960" r="560" fill="none" stroke="rgba(122,35,35,.10)" stroke-width="3" stroke-dasharray="4 14"/>' +
             '<circle cx="540" cy="960" r="480" fill="none" stroke="rgba(193,154,73,.12)" stroke-width="2" stroke-dasharray="2 10"/>' +
             '</svg>',
    },
    { // dusk glow — crescent cluster, top-right
      bg: 'radial-gradient(ellipse at 78% 8%, rgba(110,30,30,.16), transparent 45%),' +
          'radial-gradient(ellipse at 50% 104%, rgba(224,138,46,.20), transparent 55%),#F6EEDF',
      motif: '<svg viewBox="0 0 1080 1920" width="1080" height="1920">' +
             '<circle cx="880" cy="300" r="230" fill="rgba(110,30,30,.06)"/>' +
             '<circle cx="960" cy="230" r="230" fill="#F6EEDF"/>' +
             '<circle cx="180" cy="1650" r="170" fill="none" stroke="rgba(193,154,73,.14)" stroke-width="2" stroke-dasharray="3 9"/>' +
             '</svg>',
    },
    { // temple — layered arch silhouette at the base
      bg: 'radial-gradient(ellipse at 12% 30%, rgba(193,154,73,.14), transparent 50%),' +
          'radial-gradient(ellipse at 88% 70%, rgba(110,30,30,.12), transparent 50%),#F7EFE0',
      motif: '<svg viewBox="0 0 1080 1920" width="1080" height="1920">' +
             '<path d="M270 1920 L270 1500 Q270 1300 540 1260 Q810 1300 810 1500 L810 1920 Z" fill="rgba(122,35,35,.055)"/>' +
             '<path d="M370 1920 L370 1560 Q370 1420 540 1390 Q710 1420 710 1560 L710 1920 Z" fill="rgba(193,154,73,.07)"/>' +
             '</svg>',
    },
    { // constellation — connect-the-dots cluster, upper canvas
      bg: 'radial-gradient(ellipse at 50% 4%, rgba(193,154,73,.18), transparent 50%),' +
          'radial-gradient(ellipse at 50% 100%, rgba(110,30,30,.10), transparent 50%),#F8F1E2',
      motif: '<svg viewBox="0 0 1080 1920" width="1080" height="1920">' +
             '<g stroke="rgba(122,35,35,.14)" stroke-width="1.5" fill="rgba(193,154,73,.5)">' +
             '<line x1="180" y1="160" x2="340" y2="90"/><line x1="340" y1="90" x2="520" y2="180"/>' +
             '<line x1="520" y1="180" x2="470" y2="330"/><line x1="900" y1="1720" x2="760" y2="1640"/>' +
             '<line x1="760" y1="1640" x2="820" y2="1500"/>' +
             '<circle cx="180" cy="160" r="6"/><circle cx="340" cy="90" r="5"/><circle cx="520" cy="180" r="6"/>' +
             '<circle cx="470" cy="330" r="4"/><circle cx="900" cy="1720" r="5"/><circle cx="760" cy="1640" r="6"/>' +
             '<circle cx="820" cy="1500" r="4"/>' +
             '</g></svg>',
    },
  ];

  // Four transition styles between slides, rotated so consecutive cuts
  // don't all look the same. Each returns {out, in} WAAPI keyframe lists.
  var TRANSITIONS = [
    { // fade + rise from below
      out: [{ opacity: 1, transform: 'translateY(0px) scale(1)' }, { opacity: 0, transform: 'translateY(-30px) scale(1)' }],
      in:  [{ opacity: 0, transform: 'translateY(30px) scale(1)' }, { opacity: 1, transform: 'translateY(0px) scale(1)' }],
    },
    { // slide sideways
      out: [{ opacity: 1, transform: 'translateX(0px) scale(1)' }, { opacity: 0, transform: 'translateX(-90px) scale(1)' }],
      in:  [{ opacity: 0, transform: 'translateX(90px) scale(1)' }, { opacity: 1, transform: 'translateX(0px) scale(1)' }],
    },
    { // zoom through
      out: [{ opacity: 1, transform: 'translateY(0px) scale(1)' }, { opacity: 0, transform: 'translateY(0px) scale(.92)' }],
      in:  [{ opacity: 0, transform: 'translateY(0px) scale(1.08)' }, { opacity: 1, transform: 'translateY(0px) scale(1)' }],
    },
    { // plain crossfade
      out: [{ opacity: 1, transform: 'translateY(0px) scale(1)' }, { opacity: 0, transform: 'translateY(0px) scale(1)' }],
      in:  [{ opacity: 0, transform: 'translateY(0px) scale(1)' }, { opacity: 1, transform: 'translateY(0px) scale(1)' }],
    },
  ];

  var SLIDES = __SLIDES__;
  var PER_MS = __PER_SLIDE_MS__;
  var i = 0;
  var contentEl = document.getElementById('content');
  var pageEl = document.getElementById('page');
  var cardEl = document.getElementById('card');
  var zoomEl = document.getElementById('zoom');
  var sceneBgEl = document.getElementById('scene-bg');
  var sceneMotifEl = document.getElementById('scene-motif');

  function applyScene(idx) {
    var scene = SCENES[idx % SCENES.length];
    sceneBgEl.style.backgroundImage = scene.bg;
    sceneMotifEl.innerHTML = scene.motif;
    sceneMotifEl.style.opacity = '0';
    sceneMotifEl.animate([{ opacity: 0 }, { opacity: .9 }], { duration: 500, easing: 'ease-out', fill: 'forwards' });
  }

  function riseInChildren(container) {
    var kids = container.children;
    for (var k = 0; k < kids.length; k++) {
      kids[k].style.opacity = '0';
      kids[k].animate(
        [
          { opacity: 0, transform: 'translateY(40px)' },
          { opacity: 1, transform: 'translateY(0px)' },
        ],
        { duration: 650, delay: k * 130, easing: 'cubic-bezier(.19,.7,.28,1)', fill: 'forwards' }
      );
    }
  }

  function zoomCard() {
    zoomEl.animate(
      [{ transform: 'scale(1)' }, { transform: 'scale(1.05)' }],
      { duration: PER_MS + 400, easing: 'ease-out', fill: 'forwards' }
    );
  }

  function renderSlide(idx) {
    contentEl.innerHTML = SLIDES[idx].html;
    pageEl.textContent = SLIDES[idx].page;
    applyScene(idx);
    riseInChildren(contentEl);
    zoomCard();
  }

  function next() {
    var t = TRANSITIONS[i % TRANSITIONS.length];
    var out = cardEl.animate(t.out, { duration: 360, easing: 'ease-in', fill: 'forwards' });
    out.onfinish = function () {
      i++;
      if (i >= SLIDES.length) {
        cardEl.animate([{ opacity: 1 }], { duration: 1, fill: 'forwards' });
        return;
      }
      renderSlide(i);
      var t2 = TRANSITIONS[i % TRANSITIONS.length];
      cardEl.animate(t2.in, { duration: 360, easing: 'ease-out', fill: 'forwards' });
      setTimeout(next, PER_MS);
    };
  }

  renderSlide(0);
  setTimeout(next, PER_MS);
</script>
</body>
</html>
