name: YouTube thumbnail-only fix-up

# Sets a thumbnail on an already-uploaded YouTube video (no new upload, no
# IG/FB calls) -- for videos that went live before cover.jpg existed for
# their post. Triggered by a push touching .github/yt-thumb-trigger, whose
# contents are "<video_id> <post_dir>".
on:
  workflow_dispatch:
    inputs:
      video_id:
        required: true
      post_dir:
        required: true
  push:
    paths:
      - ".github/yt-thumb-trigger"

permissions:
  contents: write

jobs:
  set-thumb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve args
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.video_id }}" ]; then
            echo "video_id=${{ github.event.inputs.video_id }}" >> "$GITHUB_OUTPUT"
            echo "post_dir=${{ github.event.inputs.post_dir }}" >> "$GITHUB_OUTPUT"
          else
            VID=$(awk '{print $1}' .github/yt-thumb-trigger)
            PDIR=$(awk '{print $2}' .github/yt-thumb-trigger)
            echo "video_id=$VID" >> "$GITHUB_OUTPUT"
            echo "post_dir=$PDIR" >> "$GITHUB_OUTPUT"
          fi

      - name: Set YouTube thumbnail
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python3 scripts/yt_set_thumbnail_only.py "${{ steps.resolve.outputs.video_id }}" "${{ steps.resolve.outputs.post_dir }}"

      - name: Commit result
        if: always()
        run: |
          git config user.name "astroreeti-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results/yt-thumb-test.json
          git commit -m "yt-thumb-test result" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push
