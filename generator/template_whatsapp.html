<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family:'Playfair Display'; src:url('file://FONTDIR/PlayfairDisplay.ttf'); font-weight:400 900; }
  @font-face { font-family:'Playfair Display'; src:url('file://FONTDIR/PlayfairDisplay-Italic.ttf'); font-style:italic; }
  @font-face { font-family:'Noto Serif Devanagari'; src:url('file://FONTDIR/NotoSerifDevanagari.ttf'); font-weight:400 900; }

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; }
  body {
    position:relative;
    font-family:'Noto Serif Devanagari','Playfair Display',serif;
    background:#0b0705;
  }

  /* ---------- background variants ---------- */
  .bg { position:absolute; inset:0; }

  .bg-1 {
    background:
      radial-gradient(ellipse 900px 700px at 22% 92%, rgba(196,120,40,.35), transparent 60%),
      radial-gradient(ellipse 700px 600px at 50% 45%, rgba(90,40,80,.28), transparent 65%),
      radial-gradient(ellipse 1000px 900px at 75% 15%, rgba(120,20,20,.30), transparent 60%),
      #0a0503;
  }
  .bg-2 {
    background:
      radial-gradient(ellipse 1000px 500px at 30% 0%, rgba(20,25,55,.9), transparent 60%),
      radial-gradient(ellipse 900px 700px at 85% 100%, rgba(190,90,30,.55), transparent 60%),
      linear-gradient(180deg, #060810 0%, #0c0906 55%, #241305 100%);
  }
  .bg-3 {
    background:
      radial-gradient(ellipse 700px 700px at 18% 40%, rgba(232,208,175,.9), transparent 55%),
      radial-gradient(ellipse 900px 800px at 90% 85%, rgba(120,55,20,.75), transparent 60%),
      linear-gradient(135deg, #d8c3a5 0%, #a8703f 55%, #7a4a26 100%);
  }
  .bg-4 {
    background:
      radial-gradient(ellipse 500px 500px at 50% 55%, rgba(35,25,15,.5), transparent 70%),
      #0a0a0b;
  }

  .wheel {
    position:absolute; opacity:.16;
  }
  .bg-1 .wheel { width:900px; height:900px; top:16%; left:8%; }
  .bg-2 .wheel { width:760px; height:760px; top:22%; right:-14%; opacity:.20; }
  .bg-3 .wheel { width:820px; height:820px; top:8%; left:2%; opacity:.14; }
  .bg-4 .wheel { width:760px; height:760px; top:30%; left:14%; opacity:.13; }

  .grain { position:absolute; inset:0; opacity:.05; mix-blend-mode:overlay; }

  /* ---------- logo, fixed top-left on every variant ---------- */
  .logo-scrim {
    position:absolute; top:0; left:0; width:520px; height:170px; z-index:4;
    background:radial-gradient(ellipse 480px 160px at 0% 0%, rgba(0,0,0,.38), transparent 70%);
  }
  .logo { position:absolute; top:46px; left:48px; display:flex; align-items:center; gap:16px; z-index:5; }
  .logo svg { width:74px; height:74px; }
  .wordmark {
    font-family:'Playfair Display', serif; font-weight:700;
    font-size:40px; letter-spacing:.01em; color:#EAD9AE;
    text-shadow:0 2px 10px rgba(0,0,0,.5);
  }
  .wordmark .cap { font-size:44px; font-weight:800; }
  .wordmark .lc { font-variant:normal; }

  /* ---------- text-safe content zone (lower 2/3, clear of logo) ---------- */
  .content {
    position:absolute; left:80px; right:80px; bottom:86px; top:340px;
    display:flex; flex-direction:column; justify-content:flex-end;
    z-index:5;
  }
  .eyebrow {
    font-family:'Playfair Display'; font-weight:700; font-size:26px;
    letter-spacing:.28em; text-transform:uppercase; color:#E3B15C;
    text-shadow:0 2px 12px rgba(0,0,0,.6);
    margin-bottom:18px;
  }
  h1 {
    font-family:'Noto Serif Devanagari','Playfair Display'; font-weight:800;
    font-size:64px; line-height:1.28; color:#FFFFFF;
    text-shadow:0 3px 18px rgba(0,0,0,.65), 0 1px 0 rgba(0,0,0,.4);
    margin-bottom:28px;
  }
  h1 em { font-style:normal; color:#F0C36B; }
  .body {
    font-size:34px; line-height:1.6; font-weight:500; color:#F3E9DA;
    text-shadow:0 2px 14px rgba(0,0,0,.6);
    max-width:900px;
  }
  .body b { color:#F0C36B; font-weight:700; }
  .divider { width:120px; height:3px; background:linear-gradient(90deg,#E3B15C,transparent); margin:26px 0 0; border-radius:2px; }
  .handle {
    margin-top:32px; font-family:'Playfair Display'; font-weight:700; font-size:30px;
    color:#E3B15C; text-shadow:0 2px 10px rgba(0,0,0,.6); letter-spacing:.02em;
  }
</style>
</head>
<body>
  <div class="bg BGCLASS"></div>
  <div class="wheel">
    <svg viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="96" stroke="#E3B15C" stroke-width="1"/>
      <circle cx="100" cy="100" r="70" stroke="#E3B15C" stroke-width="1"/>
      <circle cx="100" cy="100" r="44" stroke="#E3B15C" stroke-width="1"/>
      <g stroke="#E3B15C" stroke-width="1">
        <line x1="100" y1="4" x2="100" y2="196"/>
        <line x1="4" y1="100" x2="196" y2="100"/>
        <line x1="17" y1="17" x2="183" y2="183"/>
        <line x1="183" y1="17" x2="17" y2="183"/>
        <line x1="100" y1="4" x2="151" y2="49"/>
        <line x1="100" y1="4" x2="49" y2="49"/>
        <line x1="100" y1="196" x2="151" y2="151"/>
        <line x1="100" y1="196" x2="49" y2="151"/>
        <line x1="4" y1="100" x2="49" y2="151"/>
        <line x1="4" y1="100" x2="49" y2="49"/>
        <line x1="196" y1="100" x2="151" y2="151"/>
        <line x1="196" y1="100" x2="151" y2="49"/>
      </g>
    </svg>
  </div>
  <svg class="grain" width="100%" height="100%">
    <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#n)"/>
  </svg>

  <div class="logo-scrim"></div>
  <div class="logo">
    <svg viewBox="0 0 100 100" fill="none">
      <g stroke="#D9A94E" stroke-width="1.3">
        <circle cx="50" cy="50" r="6" fill="#D9A94E" stroke="none"/>
        <g id="petals"></g>
        <circle cx="50" cy="50" r="46" stroke-width="1"/>
      </g>
      <script>
      </script>
      <g stroke="#D9A94E" stroke-width="1.1" fill="none">
        <path d="M50 12 C58 28 58 40 50 50 C42 40 42 28 50 12 Z"/>
        <path d="M50 88 C58 72 58 60 50 50 C42 60 42 72 50 88 Z"/>
        <path d="M12 50 C28 42 40 42 50 50 C40 58 28 58 12 50 Z"/>
        <path d="M88 50 C72 42 60 42 50 50 C60 58 72 58 88 50 Z"/>
        <path d="M22 22 C34 30 40 38 50 50 C38 46 30 40 22 22 Z"/>
        <path d="M78 78 C66 70 60 62 50 50 C62 54 70 60 78 78 Z"/>
        <path d="M78 22 C66 30 60 38 50 50 C62 46 70 40 78 22 Z"/>
        <path d="M22 78 C34 70 40 62 50 50 C38 54 30 60 22 78 Z"/>
      </g>
    </svg>
    <div class="wordmark"><span class="cap">A</span>stro<span class="cap">R</span>eeti</div>
  </div>

  <div class="content">
    <!--SLOT-->
  </div>
</body>
</html>
